<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SWGOH Recommendations{% endblock %}</title>
  <style>
    :root {
      --bg: #0b1020; --panel: #141b31; --panel2: #1b2440; --text: #e6ebff;
      --muted: #93a0c8; --accent: #ffd54a; --good: #46d19e; --warn: #ffb020;
      --bad: #ff6b6b; --line: #263153;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 80% -10%, #1a2244 0%, var(--bg) 60%);
      color: var(--text); min-height: 100vh;
    }
    header {
      display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap;
      padding: 1.2rem 1.6rem; border-bottom: 1px solid var(--line);
    }
    header h1 { margin: 0; font-size: 1.3rem; letter-spacing: .5px; }
    header .accent { color: var(--accent); }
    header .muted { color: var(--muted); font-size: .9rem; }
    nav.nav { display: flex; gap: .3rem; }
    nav.nav a { color: var(--muted); text-decoration: none; padding: .3rem .7rem;
      border-radius: 8px; border: 1px solid var(--line); font-size: .9rem; }
    nav.nav a:hover { color: var(--text); background: var(--panel); }
    .obj { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
      padding: .7rem .9rem; margin-bottom: .5rem; display: flex; gap: .8rem; align-items: baseline; }
    .obj .rank { color: var(--accent); font-weight: 700; font-variant-numeric: tabular-nums;
      min-width: 1.4rem; }
    .pill { display:inline-block; font-size:.72rem; padding:.1rem .5rem; border-radius:999px;
      border:1px solid var(--line); color:var(--muted); text-transform: uppercase; letter-spacing:.05em; }
    .fleet-head { display:flex; gap:.6rem; align-items:baseline; flex-wrap:wrap; margin:.3rem 0 1rem; }
    .fleet-head .cap { font-size:1.2rem; font-weight:700; }
    .shiplist { display:flex; flex-wrap:wrap; gap:.4rem; margin-bottom:1.2rem; }
    .shiplist .chip { background:var(--panel2); border:1px solid var(--line); border-radius:8px;
      padding:.25rem .6rem; font-size:.85rem; }
    .squad { background:var(--panel); border:1px solid var(--line); border-radius:12px;
      padding:1rem 1.1rem; margin-bottom:.9rem; }
    .squad .top { display:flex; align-items:baseline; gap:.6rem; flex-wrap:wrap; }
    .squad .nm { font-weight:700; font-size:1.05rem; }
    .st { font-size:.72rem; padding:.15rem .55rem; border-radius:999px; font-weight:700;
      text-transform:uppercase; letter-spacing:.05em; }
    .st.Ready { background:rgba(70,209,158,.15); color:var(--good); }
    .st.Close { background:rgba(255,176,32,.15); color:var(--warn); }
    .st.Build { background:rgba(147,160,200,.12); color:var(--muted); }
    .bar { height:6px; border-radius:4px; background:var(--panel2); overflow:hidden; margin:.5rem 0; }
    .bar > i { display:block; height:100%; background:linear-gradient(90deg,var(--warn),var(--good)); }
    .tag { font-size:.68rem; padding:.1rem .45rem; border-radius:6px; border:1px solid var(--line);
      color:var(--muted); }
    main { padding: 1.4rem 1.6rem; max-width: 1100px; margin: 0 auto; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
      gap: 1rem; margin-bottom: 1.6rem; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
      padding: 1rem 1.1rem; }
    .card .k { color: var(--muted); font-size: .8rem; text-transform: uppercase;
      letter-spacing: .06em; }
    .card .v { font-size: 1.9rem; font-weight: 700; margin-top: .25rem; }
    .unit { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
      padding: .9rem 1.1rem; margin-bottom: .8rem; }
    .unit .row { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }
    .unit .name { font-weight: 700; font-size: 1.05rem; }
    .badge { font-size: .72rem; padding: .15rem .5rem; border-radius: 999px;
      border: 1px solid var(--line); color: var(--muted); }
    .badge.prio { background: rgba(255,213,74,.12); color: var(--accent);
      border-color: rgba(255,213,74,.4); }
    .badge.speed { color: var(--good); }
    .spacer { flex: 1; }
    .score { font-variant-numeric: tabular-nums; color: var(--warn); font-weight: 700; }
    ul.issues { margin: .6rem 0 0; padding-left: 1.1rem; }
    ul.issues li { margin: .2rem 0; color: var(--text); }
    ul.issues li.sev-high::marker { color: var(--bad); }
    ul.issues li.sev-mid::marker { color: var(--warn); }
    .note { color: var(--muted); font-style: italic; margin-top: .4rem; font-size: .9rem; }
    form.ally { display: flex; gap: .5rem; margin-left: auto; }
    input, button { font: inherit; }
    input[type=text] { background: var(--panel2); border: 1px solid var(--line);
      color: var(--text); border-radius: 8px; padding: .45rem .7rem; }
    button { background: var(--accent); color: #1a1400; border: 0; border-radius: 8px;
      padding: .45rem .9rem; font-weight: 700; cursor: pointer; }
    a { color: var(--accent); }
    code { background: var(--panel2); padding: .1rem .35rem; border-radius: 5px; }
    .empty { color: var(--good); padding: 1rem; }
    .rankstrip { display:flex; gap:.8rem; flex-wrap:wrap; margin:0 0 1.2rem; }
    .rankcard { background:var(--panel); border:1px solid var(--line); border-radius:10px;
      padding:.6rem .9rem; flex:1; min-width:160px; }
    .rankcard .k { color:var(--muted); font-size:.72rem; text-transform:uppercase; letter-spacing:.06em; }
    .rankcard .v { font-size:1.5rem; font-weight:700; font-variant-numeric:tabular-nums; }
    .rankcard .d { font-size:.8rem; font-weight:700; }
    .d.up { color:var(--good); } .d.down { color:var(--bad); } .d.flat { color:var(--muted); }
    .charts { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:.8rem; margin:0 0 1.4rem; }
    .chartcard { background:var(--panel); border:1px solid var(--line); border-radius:10px;
      padding:.7rem .9rem .5rem; }
    .chartcard .k { color:var(--muted); font-size:.72rem; text-transform:uppercase;
      letter-spacing:.06em; margin-bottom:.4rem; }
  </style>
</head>
<body>
  <header>
    <h1><span class="accent">SWGOH</span> Recommendations</h1>
    <nav class="nav">
      <a href="/{% if ally_code %}?ally_code={{ ally_code }}{% endif %}">Tonight</a>
      <a href="/mods{% if ally_code %}?ally_code={{ ally_code }}{% endif %}">Mods</a>
      <a href="/fleet{% if ally_code %}?ally_code={{ ally_code }}{% endif %}">Fleet</a>
      <a href="/squads{% if ally_code %}?ally_code={{ ally_code }}{% endif %}">Squads</a>
      <a href="/defense{% if ally_code %}?ally_code={{ ally_code }}{% endif %}">Defense</a>
      <a href="/relics{% if ally_code %}?ally_code={{ ally_code }}{% endif %}">Relics</a>
      <a href="/zetas{% if ally_code %}?ally_code={{ ally_code }}{% endif %}">Zetas</a>
      <a href="/energy{% if ally_code %}?ally_code={{ ally_code }}{% endif %}">Energy</a>
    </nav>
    {% block subtitle %}{% endblock %}
    <form class="ally" method="get" action="{% block form_action %}/{% endblock %}">
      <input type="text" name="ally_code" placeholder="Ally code" value="{{ ally_code or '' }}">
      <button type="submit">Load</button>
    </form>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
