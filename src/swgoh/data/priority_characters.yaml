# Curated per-character mod guidance. Fully user-editable.
#
# base_id values come from swgoh.gg (e.g. the DARTHVADER in
# swgoh.gg/characters/darth-vader/). Add or correct entries freely.
#
# Fields per character:
#   weight: importance multiplier for ranking (higher = shown first). Default 1.
#   arrow:  preferred Arrow (slot 2) primary stat. Default "Speed".
#   sets:   set bonuses the character should have COMPLETED. Valid set names:
#           Speed, Offense, Health, Defense, Critical Chance, Critical Damage,
#           Potency, Tenacity.  (Speed/Offense/Crit Damage need 4 mods; the
#           rest need 2.)  Example: [Speed, Critical Chance] == 4 speed + 2 crit.
#   note:   optional free-text guidance surfaced in the report.

